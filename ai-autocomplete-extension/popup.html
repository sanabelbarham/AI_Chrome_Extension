<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 260px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    h1 { font-size: 14px; margin: 0 0 12px 0; }
    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    input[type="password"] {
      width: 100%; box-sizing: border-box; padding: 6px 8px; margin-bottom: 12px;
      border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
    }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    button {
      width: 100%; padding: 8px; border: none; border-radius: 4px;
      background: #5850EC; color: white; font-size: 13px; cursor: pointer;
    }
    #status { font-size: 11px; color: green; margin-top: 8px; text-align: center; min-height: 14px; }
  </style>
</head>
<body>
  <h1>AI Autocomplete Settings</h1>

  <div class="toggle-row">
    <label for="enabledToggle">Enabled</label>
    <input type="checkbox" id="enabledToggle">
  </div>

  <label for="apiKeyInput">Gemini API Key</label>
  <input type="password" id="apiKeyInput" placeholder="AIza...">

  <button id="saveBtn">Save</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
